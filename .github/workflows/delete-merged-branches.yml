name: Delete merged branches

on:
  pull_request:
    types: [closed]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  delete-merged-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged feature branches
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const defaultBranch = context.payload.repository?.default_branch || 'main';
            const protectedBranches = [defaultBranch];

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner,
              repo,
              per_page: 100,
            });
            const defaultBranchInfo = branches.find((branch) => branch.name === defaultBranch);

            if (!defaultBranchInfo) {
              core.setFailed(`Could not find default branch: ${defaultBranch}`);
              return;
            }

            const { data: defaultCommit } = await github.rest.git.getCommit({
              owner,
              repo,
              commit_sha: defaultBranchInfo.commit.sha,
            });

            for (const branch of branches) {
              if (protectedBranches.includes(branch.name)) {
                continue;
              }

              const { data: openPulls } = await github.rest.pulls.list({
                owner,
                repo,
                head: `${owner}:${branch.name}`,
                state: 'open',
                per_page: 1,
              });

              if (openPulls.length > 0) {
                console.log(`Skipping branch with open pull request: ${branch.name}`);
                continue;
              }

              const { data: closedPulls } = await github.rest.pulls.list({
                owner,
                repo,
                head: `${owner}:${branch.name}`,
                state: 'closed',
                per_page: 1,
              });

              let deleteReason = null;
              if (closedPulls.length > 0 && closedPulls[0].merged_at) {
                deleteReason = 'merged pull request';
              } else if (closedPulls.length > 0) {
                try {
                  const { data: branchCommit } = await github.rest.git.getCommit({
                    owner,
                    repo,
                    commit_sha: branch.commit.sha,
                  });

                  if (branchCommit.tree.sha === defaultCommit.tree.sha) {
                    deleteReason = `closed pull request with no remaining file changes vs ${defaultBranch}`;
                  } else {
                    console.log(`Keeping closed branch with remaining changes: ${branch.name}`);
                  }
                } catch (error) {
                  console.log(`Failed to compare ${branch.name} against ${defaultBranch}: ${error.message}`);
                }
              }

              if (deleteReason) {
                console.log(`Deleting branch (${deleteReason}): ${branch.name}`);
                try {
                  await github.rest.git.deleteRef({
                    owner,
                    repo,
                    ref: `heads/${branch.name}`,
                  });
                  console.log(`  Deleted: ${branch.name}`);
                } catch (error) {
                  console.log(`  Failed to delete ${branch.name}: ${error.message}`);
                }
              }
            }
